spring:
  application:
    name: scholarship-tracker-backend
  datasource:
    url: ${JDBC_DATABASE_URL:${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_DATABASE:scholarship_db}}}}
    username: ${SPRING_DATASOURCE_USERNAME:scholarship_user}
    password: ${SPRING_DATASOURCE_PASSWORD:scholarship_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 20000
      idle-timeout: 300000
      data-source-properties:
        channelBinding: disable
        sslmode: ${DB_SSL_MODE:disable}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.hibernate.type.descriptor.sql: WARN