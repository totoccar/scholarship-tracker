spring:
  application:
    name: scholarship-tracker-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scholarship_db}
    username: ${SPRING_DATASOURCE_USERNAME:scholarship_user}
    password: ${SPRING_DATASOURCE_PASSWORD:scholarship_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
