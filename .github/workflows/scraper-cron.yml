name: Scholarship Scraper Cron

on:
  schedule:
    - cron: '0 * * * *' # Corre cada hora (minuto 0)
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Run Scraper
        env:
          # Usamos la URL pública que te dio Render para tu API
          API_URL: ${{ secrets.API_URL }} 
          REQUEST_TIMEOUT_SECONDS: '30'
          BACKEND_WAIT_SECONDS: '10'
          BACKEND_MAX_WAIT_SECONDS: '300'
        run: python scraper/scraper.py