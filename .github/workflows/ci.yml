name: Full Stack CI-CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # JOB 1: Testear el Backend
  build-test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build and test
        run: mvn -B clean verify
        working-directory: backend

  # JOB 2: Build de Imágenes Docker (Solo si el Job 1 termina en éxito)
  build-docker-images:
    needs: build-test-backend 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/scholarship-app:latest

      - name: Build and Push Scraper
        uses: docker/build-push-action@v5
        with:
          context: ./scraper
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/scholarship-scraper:latest